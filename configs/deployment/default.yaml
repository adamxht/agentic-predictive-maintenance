# Serving config for the FastAPI inference app (app/api.py).
model: "trained_model/life_ratio_rf_xgb/xgboost"
mlflow_tracking_uri: "sqlite:///mlflow.db"
database_path: "monitor/inference_log.db"
deployment_log_directory: "monitor/logs" # hourly <YYYY-MM-DD_HH>.log prediction logs

life_ratio_threshold: 0.1

preprocessing:
  pipeline_steps:
    - "missing_value_handling"
    - "scaling"
    - "feature_engineering"
    - "feature_selection"
  rolling_window_size: 5
  lag_steps: [1, 2]
