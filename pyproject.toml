[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "N818", # CustomException is this project's established exception name
    "N803", # X/y are idiomatic sklearn-style feature-matrix/target argument names
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Entry point scripts append the project root to sys.path before importing src.*
"scripts/*.py" = ["E402"]
"app/*.py" = ["E402"]

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
# All tests here are plain functions; disable class-based collection so
# pytest doesn't try (and warn) to collect unrelated "Test*"-named classes
# imported into test modules (e.g. TestSetPreparationPipeline).
python_classes = "Never*MatchAnythingHere*"
