name: Tests

"on":
  push:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit_test.py -v

      - name: Run integration tests
        run: pytest tests/integration_test.py -v

  agent-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: docker/requirements_agent.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # A separate job (rather than a step in `test`) so this dependency
          # set -- deliberately scoped to src_agent/, no ML deps -- never
          # gets pip-installed alongside requirements.txt's scikit-learn/
          # xgboost/mlflow stack, which docker/requirements_agent.txt's own
          # header comment explicitly excludes it from.
          pip install -r docker/requirements_agent.txt pytest

      - name: Run agent tests
        run: pytest tests/agents_test.py -v
